spring.application.name=BolsaTrabajo_BE

# Configuración de base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/oficina_empleo_sanjose?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=sysadmin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate y JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Puerto de la aplicación
server.port=8080
